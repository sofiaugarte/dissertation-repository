<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reading Repository — Sofía Ugarte</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #1a1410;
  --paper: #f7f3ee;
  --paper2: #f0ebe4;
  --warm: #c8773a;
  --warm-light: #f0dcc8;
  --warm-mid: #e8c5a0;
  --terra: #8b3a2a;
  --sage: #4a6741;
  --sage-light: #e8ede7;
  --dust: #9e8e7e;
  --border: #ddd5c8;
  --white: #ffffff;
  --purple-light: #ede8f5;
  --purple: #5a3e7a;
  --blue-light: #e8eef5;
  --blue: #2d5a8e;
  --red-light: #f5e8e8;
  --red: #8e2d2d;
  --gold-light: #f5f0e0;
  --gold: #8e7a2d;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--paper);
  color: var(--ink);
  font-family: 'DM Sans', sans-serif;
  font-weight: 300;
  line-height: 1.7;
  min-height: 100vh;
}

/* HEADER */
.site-header {
  background: var(--ink);
  color: var(--paper);
  padding: 2.5rem 2rem 2rem;
  position: sticky;
  top: 0;
  z-index: 100;
}

.header-inner {
  max-width: 1100px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 1rem;
  align-items: end;
}

.header-title-block .eyebrow {
  font-size: 0.65rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--dust);
  margin-bottom: 0.4rem;
}

.header-title-block h1 {
  font-family: 'Playfair Display', serif;
  font-size: clamp(1.4rem, 3vw, 2rem);
  font-weight: 400;
  color: var(--paper);
  line-height: 1.2;
}

.header-title-block h1 em {
  font-style: italic;
  color: var(--warm);
}

.header-stats {
  display: flex;
  gap: 1.5rem;
  text-align: right;
}

.stat { }
.stat-num {
  font-family: 'Playfair Display', serif;
  font-size: 1.6rem;
  font-weight: 400;
  color: var(--warm);
  display: block;
  line-height: 1;
}
.stat-label {
  font-size: 0.65rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--dust);
}

/* CONTROLS */
.controls {
  background: var(--paper2);
  border-bottom: 1px solid var(--border);
  padding: 1rem 2rem;
  position: sticky;
  top: 108px;
  z-index: 90;
}

.controls-inner {
  max-width: 1100px;
  margin: 0 auto;
  display: flex;
  flex-wrap: wrap;
  gap: 0.75rem;
  align-items: center;
}

.search-wrap {
  position: relative;
  flex: 1;
  min-width: 200px;
  max-width: 320px;
}

.search-wrap input {
  width: 100%;
  padding: 0.5rem 0.75rem 0.5rem 2rem;
  border: 1px solid var(--border);
  border-radius: 3px;
  background: var(--white);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.85rem;
  color: var(--ink);
  outline: none;
}

.search-wrap input:focus { border-color: var(--warm); }

.search-icon {
  position: absolute;
  left: 0.6rem;
  top: 50%;
  transform: translateY(-50%);
  color: var(--dust);
  font-size: 0.8rem;
  pointer-events: none;
}

.filter-group {
  display: flex;
  gap: 0.4rem;
  flex-wrap: wrap;
}

.filter-btn {
  padding: 0.35rem 0.75rem;
  border: 1px solid var(--border);
  border-radius: 2px;
  background: var(--white);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.72rem;
  font-weight: 400;
  letter-spacing: 0.05em;
  color: var(--dust);
  cursor: pointer;
  transition: all 0.15s;
}

.filter-btn:hover { border-color: var(--warm); color: var(--warm); }
.filter-btn.active { background: var(--ink); border-color: var(--ink); color: var(--paper); }

.add-btn {
  margin-left: auto;
  padding: 0.5rem 1.25rem;
  background: var(--warm);
  border: none;
  border-radius: 3px;
  color: white;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.8rem;
  font-weight: 500;
  cursor: pointer;
  transition: background 0.15s;
  white-space: nowrap;
}
.add-btn:hover { background: var(--terra); }

/* MAIN LAYOUT */
.main {
  max-width: 1100px;
  margin: 0 auto;
  padding: 2rem;
}

.section-group { margin-bottom: 3rem; }

.section-heading {
  display: flex;
  align-items: baseline;
  gap: 0.75rem;
  margin-bottom: 1.25rem;
  padding-bottom: 0.6rem;
  border-bottom: 1px solid var(--border);
}

.section-num {
  font-family: 'Playfair Display', serif;
  font-size: 2rem;
  font-weight: 400;
  color: var(--warm-light);
  line-height: 1;
}

.section-title {
  font-family: 'Playfair Display', serif;
  font-size: 1.15rem;
  font-weight: 600;
  color: var(--ink);
}

.section-count {
  font-size: 0.72rem;
  color: var(--dust);
  letter-spacing: 0.08em;
  margin-left: auto;
}

/* BOOK CARDS */
.books-grid {
  display: grid;
  gap: 1rem;
}

.book-card {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 4px;
  overflow: hidden;
  transition: box-shadow 0.2s;
}

.book-card:hover { box-shadow: 0 2px 12px rgba(0,0,0,0.08); }

.book-card.hidden { display: none; }

.card-top {
  padding: 1.25rem 1.5rem 1rem;
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 1rem;
  align-items: start;
  cursor: pointer;
}

.card-meta { flex: 1; }

.card-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 0.3rem;
  margin-bottom: 0.5rem;
}

.tag {
  display: inline-block;
  font-size: 0.6rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 0.15rem 0.5rem;
  border-radius: 2px;
  font-weight: 500;
}

.tag-start { background: var(--warm-light); color: var(--terra); }
.tag-core { background: var(--sage-light); color: var(--sage); }
.tag-method { background: var(--purple-light); color: var(--purple); }
.tag-expand { background: var(--red-light); color: var(--red); }

.concept-tag {
  background: var(--gold-light);
  color: var(--gold);
  display: inline-block;
  font-size: 0.6rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 0.15rem 0.5rem;
  border-radius: 2px;
  font-weight: 500;
}

.book-title-display {
  font-family: 'Playfair Display', serif;
  font-size: 1.05rem;
  font-style: italic;
  font-weight: 400;
  color: var(--ink);
  margin-bottom: 0.15rem;
  line-height: 1.3;
}

.book-author-display {
  font-size: 0.78rem;
  font-weight: 500;
  color: var(--terra);
  margin-bottom: 0.5rem;
}

.book-desc {
  font-size: 0.82rem;
  color: var(--dust);
  line-height: 1.6;
}

/* STATUS */
.status-block { text-align: right; }

.status-badge {
  display: inline-block;
  padding: 0.25rem 0.7rem;
  border-radius: 20px;
  font-size: 0.65rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  font-weight: 500;
  cursor: pointer;
  border: none;
  font-family: 'DM Sans', sans-serif;
  transition: all 0.15s;
}

.status-unread { background: var(--paper2); color: var(--dust); border: 1px solid var(--border); }
.status-reading { background: var(--blue-light); color: var(--blue); }
.status-done { background: var(--sage-light); color: var(--sage); }

.expand-icon {
  display: block;
  margin-top: 0.5rem;
  font-size: 0.7rem;
  color: var(--dust);
  text-align: right;
}

/* EXPANDABLE REFLECTION AREA */
.card-body {
  display: none;
  border-top: 1px solid var(--border);
  padding: 1.25rem 1.5rem;
  background: #fdfaf7;
}

.card-body.open { display: block; }

.reflection-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1rem;
  margin-bottom: 1rem;
}

@media (max-width: 640px) {
  .reflection-grid { grid-template-columns: 1fr; }
  .header-stats { display: none; }
  .card-top { grid-template-columns: 1fr; }
}

.reflection-field label {
  display: block;
  font-size: 0.65rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--warm);
  margin-bottom: 0.4rem;
  font-weight: 500;
}

.reflection-field textarea,
.reflection-field input[type="text"] {
  width: 100%;
  padding: 0.65rem 0.75rem;
  border: 1px solid var(--border);
  border-radius: 3px;
  background: var(--white);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.83rem;
  font-weight: 300;
  color: var(--ink);
  line-height: 1.6;
  resize: vertical;
  outline: none;
  transition: border-color 0.15s;
}

.reflection-field textarea:focus,
.reflection-field input[type="text"]:focus { border-color: var(--warm); }

.reflection-field textarea { min-height: 90px; }

.reflection-full { grid-column: 1 / -1; }

.save-note {
  font-size: 0.72rem;
  color: var(--dust);
  margin-top: 0.5rem;
  font-style: italic;
}

/* EMPTY STATE */
.empty-state {
  text-align: center;
  padding: 4rem 2rem;
  color: var(--dust);
}

.empty-state p { font-size: 0.9rem; }

/* ADD MODAL */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(26,20,16,0.6);
  z-index: 200;
  align-items: center;
  justify-content: center;
  padding: 1rem;
}

.modal-overlay.open { display: flex; }

.modal {
  background: var(--paper);
  border-radius: 6px;
  padding: 2rem;
  width: 100%;
  max-width: 580px;
  max-height: 90vh;
  overflow-y: auto;
}

.modal h2 {
  font-family: 'Playfair Display', serif;
  font-size: 1.4rem;
  font-weight: 400;
  margin-bottom: 1.5rem;
  color: var(--ink);
}

.form-field { margin-bottom: 1rem; }

.form-field label {
  display: block;
  font-size: 0.65rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--warm);
  margin-bottom: 0.4rem;
  font-weight: 500;
}

.form-field input,
.form-field select,
.form-field textarea {
  width: 100%;
  padding: 0.6rem 0.75rem;
  border: 1px solid var(--border);
  border-radius: 3px;
  background: var(--white);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.85rem;
  color: var(--ink);
  outline: none;
}

.form-field textarea { min-height: 80px; resize: vertical; }

.form-field select { cursor: pointer; }

.modal-actions {
  display: flex;
  gap: 0.75rem;
  margin-top: 1.5rem;
  justify-content: flex-end;
}

.btn-cancel {
  padding: 0.5rem 1.25rem;
  border: 1px solid var(--border);
  background: transparent;
  border-radius: 3px;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.82rem;
  color: var(--dust);
  cursor: pointer;
}

.btn-save {
  padding: 0.5rem 1.5rem;
  background: var(--ink);
  border: none;
  border-radius: 3px;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.82rem;
  color: var(--paper);
  cursor: pointer;
}

.btn-save:hover { background: var(--terra); }

/* PROGRESS BAR */
.progress-bar-wrap {
  height: 3px;
  background: var(--border);
  border-radius: 2px;
  margin-top: 0.5rem;
  overflow: hidden;
}

.progress-bar-fill {
  height: 100%;
  background: var(--warm);
  border-radius: 2px;
  transition: width 0.4s ease;
}

footer {
  max-width: 1100px;
  margin: 0 auto;
  padding: 2rem;
  border-top: 1px solid var(--border);
  font-size: 0.72rem;
  color: var(--dust);
  display: flex;
  justify-content: space-between;
}
</style>
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <div class="header-title-block">
      <p class="eyebrow">PhD Reading Repository · TBGD · NMSU</p>
      <h1>Sofía Ugarte — <em>Schooled into Silence</em></h1>
    </div>
    <div class="header-stats">
      <div class="stat">
        <span class="stat-num" id="stat-total">0</span>
        <span class="stat-label">Total</span>
      </div>
      <div class="stat">
        <span class="stat-num" id="stat-reading">0</span>
        <span class="stat-label">Reading</span>
      </div>
      <div class="stat">
        <span class="stat-num" id="stat-done">0</span>
        <span class="stat-label">Complete</span>
      </div>
    </div>
  </div>
  <div style="max-width:1100px;margin:0.75rem auto 0;">
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progress-bar" style="width:0%"></div>
    </div>
  </div>
</header>

<div class="controls">
  <div class="controls-inner">
    <div class="search-wrap">
      <span class="search-icon">&#9906;</span>
      <input type="text" id="search-input" placeholder="Search author, title, concept…" oninput="applyFilters()">
    </div>
    <div class="filter-group" id="section-filters">
      <button class="filter-btn active" data-filter="all" onclick="setFilter(this,'section')">All</button>
      <button class="filter-btn" data-filter="01" onclick="setFilter(this,'section')">01 Anchors</button>
      <button class="filter-btn" data-filter="02" onclick="setFilter(this,'section')">02 Schools</button>
      <button class="filter-btn" data-filter="03" onclick="setFilter(this,'section')">03 Language</button>
      <button class="filter-btn" data-filter="04" onclick="setFilter(this,'section')">04 Methods</button>
      <button class="filter-btn" data-filter="05" onclick="setFilter(this,'section')">05 Indigenous</button>
      <button class="filter-btn" data-filter="06" onclick="setFilter(this,'section')">06 Comparative</button>
    </div>
    <div class="filter-group" id="status-filters">
      <button class="filter-btn active" data-filter="all" onclick="setFilter(this,'status')">All status</button>
      <button class="filter-btn" data-filter="unread" onclick="setFilter(this,'status')">Unread</button>
      <button class="filter-btn" data-filter="reading" onclick="setFilter(this,'status')">Reading</button>
      <button class="filter-btn" data-filter="done" onclick="setFilter(this,'status')">Done</button>
    </div>
    <button class="add-btn" onclick="openModal()">+ Add Reading</button>
  </div>
</div>

<main class="main" id="main-content"></main>

<footer>
  <span>Sofía Ugarte · PhD in Transborder and Global Human Dynamics · NMSU · 2026</span>
  <span>Data saved in your browser · <a href="#" onclick="exportData()" style="color:var(--warm);text-decoration:none;">Export JSON</a></span>
</footer>

<!-- ADD MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2>Add a Reading</h2>
    <div class="form-field">
      <label>Title</label>
      <input type="text" id="f-title" placeholder="Book or article title">
    </div>
    <div class="form-field">
      <label>Author & Year</label>
      <input type="text" id="f-author" placeholder="e.g. Gloria Anzaldúa (1987)">
    </div>
    <div class="form-field">
      <label>Section</label>
      <select id="f-section">
        <option value="01">01 — Epistemological Anchors</option>
        <option value="02">02 — Schools as Colonial Technologies</option>
        <option value="03">03 — Linguistic Violence & Heritage Loss</option>
        <option value="04">04 — Decolonial Research Methods</option>
        <option value="05">05 — Indigenous Languages & Layered Coloniality</option>
        <option value="06">06 — Comparative Context</option>
      </select>
    </div>
    <div class="form-field">
      <label>Type</label>
      <select id="f-type">
        <option value="start">Start here — foundational</option>
        <option value="core">Core theory</option>
        <option value="method">Methodology</option>
        <option value="expand">Expand</option>
      </select>
    </div>
    <div class="form-field">
      <label>Theoretical concepts (comma separated)</label>
      <input type="text" id="f-concepts" placeholder="e.g. coloniality of power, linguistic violence">
    </div>
    <div class="form-field">
      <label>Why this text matters for your research</label>
      <textarea id="f-desc" placeholder="Brief note on relevance…"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveNewBook()">Add to Repository</button>
    </div>
  </div>
</div>

<script>
// ─── DATA ──────────────────────────────────────────────────────────────────

const SECTIONS = {
  "01": "Epistemological Anchors",
  "02": "Schools as Colonial Technologies",
  "03": "Linguistic Violence & Heritage Loss",
  "04": "Decolonial Research Methods",
  "05": "Indigenous Languages & Layered Coloniality",
  "06": "Comparative Context"
};

const DEFAULT_BOOKS = [
  {
    id: "b001", section: "01", type: "start",
    title: "Borderlands / La Frontera: The New Mestiza",
    author: "Gloria Anzaldúa (1987)",
    concepts: ["linguistic violence", "la herida abierta", "borderlands", "mestiza consciousness"],
    desc: "Your most important text. Chapters 5 and 7 directly theorize linguistic violence and the psychic wound of language shame. Her concept of la herida abierta is the emotional and theoretical center of your dissertation.",
    status: "unread", reflection: "", quotes: "", connection: ""
  },
  {
    id: "b002", section: "01", type: "core",
    title: "Coloniality of Power, Eurocentrism, and Latin America",
    author: "Aníbal Quijano (2000)",
    concepts: ["coloniality of power", "racial hierarchy", "decolonial theory"],
    desc: "The structural foundation. Quijano shows how racial hierarchy was the organizing principle of colonial capitalism and persists in institutional form. Read before Mignolo.",
    status: "unread", reflection: "", quotes: "", connection: ""
  },
  {
    id: "b003", section: "01", type: "core",
    title: "Local Histories / Global Designs",
    author: "Walter Mignolo (2000)",
    concepts: ["coloniality of knowledge", "border thinking", "epistemology"],
    desc: "Extends Quijano into epistemology — the coloniality of knowledge. Suppressing Spanish was not just cultural but an epistemological act: erasing ways of knowing, not just ways of speaking.",
    status: "unread", reflection: "", quotes: "", connection: ""

  {
    id: "b004", section: "01", type: "core",
    title: "On the Coloniality of Being",
    author: "Nelson Maldonado-Torres (2007)",
    concepts: ["coloniality of being", "ontology", "existential colonialism"],
    desc: "The existential dimension of coloniality — what it does to the human sense of being and belonging. Key for theorizing what third-generation descendants are grieving: not just a language, but an ontological wholeness.",
    status: "unread", reflection: "", quotes: "", connection: ""
  },
  {
    id: "b005", section: "01", type: "core",
    title: "La Guerra Silenciosa / Essays on Gender and Territory",
    author: "Rita Segato (2010)",
    concepts: ["territory as body", "gender and coloniality", "patriarchal violence"],
    desc: "Territory as body, body as territory. Essential for the gendered dimension of your research — how girls were punished differently and tracked toward domestic labor. Also connects to your own positionality and the Uruguay/Brazil border.",

  },
  {

  },
  {
    id: "b007", section: "02", type: "core",

    concepts: ["school segregation", "Mexican-American history", "labor tracking"],

    status: "unread", reflection: "", quotes: "", connection: ""
  },
  {
    id: "b008", section: "02", type: "expand",
    title: "Looking Like a Language, Sounding Like a Race",
    author: "Jonathan Rosa (2019)",
    concepts: ["raciolinguistics", "Latinx youth", "language and race"],
    desc: "Rosa shows how Latinx youth are raciolinguistically marked — heard and seen through a racial lens regardless of what language they speak. Bridges your historical analysis to the present.",
    status: "unread", reflection: "", quotes: "", connection: ""

  {
    id: "b009", section: "03", type: "start",

    desc: "Translanguaging — the idea that bilinguals draw from one integrated linguistic repertoire. The suppression of Spanish didn't just remove a language; it fractured a unified way of being.",
    status: "unread", reflection: "", quotes: "", connection: ""
  },
  {
    id: "b010", section: "03", type: "core",
    title: "Growing Up Bilingual: Puerto Rican Children in New York",
    author: "Ana Celia Zentella (1997)",
    concepts: ["language shame", "Spanglish", "bilingual identity"],
    desc: "Zentella's foundational work on Spanglish and identity. Her concept of language shame internalized from institutional shaming is directly applicable to your three-generation research.",
    status: "unread", reflection: "", quotes: "", connection: ""
  },
  {
    id: "b011", section: "03", type: "expand",
    title: "Reversing Language Shift",
    author: "Joshua Fishman (1991)",

    status: "unread", reflection: "", quotes: "", connection: ""
  },
  {
    id: "b012", section: "04", type: "start",
    title: "Decolonizing Methodologies: Research and Indigenous Peoples",

// ─── STATE ─────────────────────────────────────────────────────────────────

let books = [];
let sectionFilter = "all";
let statusFilter = "all";

function loadData() {
  try {
    const saved = localStorage.getItem("sofia_repo_v2");
    if (saved) {
      books = JSON.parse(saved);
    } else {
      books = DEFAULT_BOOKS.map(b => ({...b}));
      saveData();
    }
  } catch(e) {
    books = DEFAULT_BOOKS.map(b => ({...b}));
  }
}

function saveData() {
  try {
    localStorage.setItem("sofia_repo_v2", JSON.stringify(books));
  } catch(e) {}
}

// ─── RENDER ────────────────────────────────────────────────────────────────

function render() {
  const main = document.getElementById("main-content");
  const search = document.getElementById("search-input").value.toLowerCase();

  const filtered = books.filter(b => {
    const matchSection = sectionFilter === "all" || b.section === sectionFilter;
    const matchStatus = statusFilter === "all" || b.status === statusFilter;
    const matchSearch = !search ||
      b.title.toLowerCase().includes(search) ||
      b.author.toLowerCase().includes(search) ||
      (b.concepts || []).some(c => c.toLowerCase().includes(search)) ||
      (b.reflection || "").toLowerCase().includes(search);
    return matchSection && matchStatus && matchSearch;
  });

  const grouped = {};
  filtered.forEach(b => {
    if (!grouped[b.section]) grouped[b.section] = [];
    grouped[b.section].push(b);
  });

  let html = "";
  const sectionKeys = Object.keys(SECTIONS);

  sectionKeys.forEach(sec => {
    if (!grouped[sec] || grouped[sec].length === 0) return;
    const sBooks = grouped[sec];
    html += `<div class="section-group" data-section="${sec}">
      <div class="section-heading">
        <span class="section-num">${sec}</span>
        <span class="section-title">${SECTIONS[sec]}</span>
        <span class="section-count">${sBooks.length} text${sBooks.length !== 1 ? 's' : ''}</span>
      </div>
      <div class="books-grid">`;

    sBooks.forEach(b => {
      const statusClass = `status-${b.status}`;
      const statusLabel = b.status === "unread" ? "Not started" : b.status === "reading" ? "Reading now" : "Complete";
      const conceptTags = (b.concepts || []).map(c => `<span class="concept-tag">${c}</span>`).join(" ");
      const typeBadge = b.type ? `<span class="tag tag-${b.type}">${tagLabel(b.type)}</span>` : "";
      const hasNotes = b.reflection || b.quotes || b.connection;

      html += `<div class="book-card" id="card-${b.id}">
        <div class="card-top" onclick="toggleCard('${b.id}')">
          <div class="card-meta">
            <div class="card-tags">${typeBadge}${conceptTags}</div>
            <div class="book-title-display">${b.title}</div>
            <div class="book-author-display">${b.author}</div>
            <div class="book-desc">${b.desc}</div>
          </div>
          <div class="status-block">
            <button class="status-badge ${statusClass}" onclick="cycleStatus(event,'${b.id}')">${statusLabel}</button>
            <span class="expand-icon">${hasNotes ? '✦ has notes' : '+ add notes'}</span>
          </div>
        </div>
        <div class="card-body" id="body-${b.id}">
          <div class="reflection-grid">
            <div class="reflection-field">
              <label>My Reflection</label>
              <textarea placeholder="What did this text open up for you? What did it challenge?" onchange="saveField('${b.id}','reflection',this.value)">${b.reflection || ""}</textarea>
            </div>
            <div class="reflection-field">
              <label>Key Quotes & Page Numbers</label>
              <textarea placeholder="p.xx — &quot;quote&quot;" onchange="saveField('${b.id}','quotes',this.value)">${b.quotes || ""}</textarea>
            </div>
            <div class="reflection-field reflection-full">
              <label>How This Connects to My Research</label>
              <textarea placeholder="Which argument, chapter, or research question does this feed into?" onchange="saveField('${b.id}','connection',this.value)">${b.connection || ""}</textarea>
            </div>
          </div>
          <p class="save-note">Notes save automatically as you type.</p>
        </div>
      </div>`;
    });

    html += `</div></div>`;
  });

  if (filtered.length === 0) {
    html = `<div class="empty-state"><p>No readings match your current filters.</p></div>`;
  }

  main.innerHTML = html;
  updateStats();
}

function tagLabel(type) {
  return { start: "Start here", core: "Core theory", method: "Methodology", expand: "Expand" }[type] || type;
}

// ─── INTERACTIONS ──────────────────────────────────────────────────────────

function toggleCard(id) {
  const body = document.getElementById(`body-${id}`);
  body.classList.toggle("open");
}

function cycleStatus(e, id) {
  e.stopPropagation();
  const b = books.find(x => x.id === id);
  if (!b) return;
  const cycle = ["unread", "reading", "done"];
  b.status = cycle[(cycle.indexOf(b.status) + 1) % cycle.length];
  saveData();
  render();
  const body = document.getElementById(`body-${id}`);
  if (body) body.classList.add("open");
}

function saveField(id, field, value) {
  const b = books.find(x => x.id === id);
  if (!b) return;
  b[field] = value;
  saveData();
}

function setFilter(btn, type) {
  if (type === "section") {
    document.querySelectorAll("#section-filters .filter-btn").forEach(b => b.classList.remove("active"));
    sectionFilter = btn.dataset.filter;
  } else {
    document.querySelectorAll("#status-filters .filter-btn").forEach(b => b.classList.remove("active"));
    statusFilter = btn.dataset.filter;
  }
  btn.classList.add("active");
  render();
}

function applyFilters() { render(); }

function updateStats() {
  const total = books.length;
  const reading = books.filter(b => b.status === "reading").length;
  const done = books.filter(b => b.status === "done").length;
  document.getElementById("stat-total").textContent = total;
  document.getElementById("stat-reading").textContent = reading;
  document.getElementById("stat-done").textContent = done;
  const pct = total > 0 ? Math.round((done / total) * 100) : 0;
  document.getElementById("progress-bar").style.width = pct + "%";
}

// ─── ADD MODAL ─────────────────────────────────────────────────────────────

function openModal() {
  document.getElementById("modal").classList.add("open");
}

function closeModal() {
  document.getElementById("modal").classList.remove("open");
  ["f-title","f-author","f-concepts","f-desc"].forEach(id => {
    document.getElementById(id).value = "";
  });
}

function saveNewBook() {
  const title = document.getElementById("f-title").value.trim();
  const author = document.getElementById("f-author").value.trim();
  if (!title || !author) { alert("Please add at least a title and author."); return; }
  const concepts = document.getElementById("f-concepts").value
    .split(",").map(c => c.trim()).filter(Boolean);
  const newBook = {
    id: "b" + Date.now(),
    section: document.getElementById("f-section").value,
    type: document.getElementById("f-type").value,
    title, author, concepts,
    desc: document.getElementById("f-desc").value.trim(),
    status: "unread", reflection: "", quotes: "", connection: ""
  };
  books.push(newBook);
  saveData();
  closeModal();
  render();
}

// ─── EXPORT ────────────────────────────────────────────────────────────────

function exportData() {
  const json = JSON.stringify(books, null, 2);
  const blob = new Blob([json], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "sofia_reading_repository.json";
  a.click();
  URL.revokeObjectURL(url);
}

// ─── INIT ──────────────────────────────────────────────────────────────────

loadData();
render();
</script>
